name: Deploy to Amazon EKS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout source code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build Docker image using Git Commit SHA
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/linux-system-info:${{ github.sha }} .

      # Push image to Docker Hub
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/linux-system-info:${{ github.sha }}

      # Configure AWS credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Install kubectl
      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      # Connect to EKS cluster
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name learning-cluster

      # Deploy the new image
      - name: Update Kubernetes Deployment
        run: |
          kubectl set image deployment/linux-system-info \
          linux-system-info=${{ secrets.DOCKER_USERNAME }}/linux-system-info:${{ github.sha }}

      # Wait until rollout completes
      - name: Verify Rollout
        run: |
          kubectl rollout status deployment/linux-system-info

      # Show running pods
      - name: Show Pods
        run: |
          kubectl get pods

      # Show service
      - name: Show Services
        run: |
          kubectl get svc
